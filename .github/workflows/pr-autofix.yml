name: PR Autofix

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: pr-autofix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply automatic fixes
        run: bun run ci:autofix

      - name: Commit and push fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No autofix changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(ci): apply automated fixes"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
